name: pipeline-cron

# Free alternative to Vercel Cron (Hobby only allows daily crons).
# Hits the protected pipeline endpoints on a schedule.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   APP_URL      e.g. https://your-app.vercel.app   (no trailing slash)
#   CRON_SECRET  must match the CRON_SECRET env var set in Vercel
#
# Until APP_URL is set, runs are a no-op (no failures/emails).
# Note: GitHub disables scheduled workflows after 60 days of repo inactivity.

on:
  schedule:
    - cron: "27 */6 * * *" # every 6h at :27 — off-peak (GitHub delays/skips top-of-hour crons)
  workflow_dispatch: {} # allow manual runs from the Actions tab

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Ingest new items
        run: |
          if [ -z "${{ secrets.APP_URL }}" ]; then
            echo "APP_URL not configured — skipping."; exit 0
          fi
          code=$(curl -sS -X POST -o /tmp/ingest.json -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/ingest")
          echo "HTTP $code"; cat /tmp/ingest.json; echo
          # Fail on redirects/errors (e.g. Vercel auth) instead of passing silently.
          test "$code" = "200"

      - name: Process pending items (batched to stay under the function timeout)
        run: |
          if [ -z "${{ secrets.APP_URL }}" ]; then
            echo "APP_URL not configured — skipping."; exit 0
          fi
          # Each call augments+dedups a small batch (<60s on Vercel Hobby);
          # loop until nothing is pending, with a safety cap.
          for i in $(seq 1 40); do
            code=$(curl -sS -m 75 -X POST -o /tmp/p.json -w "%{http_code}" \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
              "${{ secrets.APP_URL }}/api/cron/process?limit=15")
            echo "batch $i -> HTTP $code: $(cat /tmp/p.json)"
            test "$code" = "200"
            grep -q '"processed":0' /tmp/p.json && { echo "no more pending — done."; break; }
          done
